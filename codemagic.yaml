# BodyLog iOS — Codemagic クラウドビルド設定（Mac不要でTestFlightまで届ける）
# 事前準備（Codemagic側のUIで1回だけ）:
#  1. Teams > Integrations > App Store Connect でAPIキーを登録（名前: bodylog-asc）
#  2. このリポジトリをCodemagicに接続し、このworkflowを実行
workflows:
  ios-testflight:
    name: BodyLog iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 45
    integrations:
      app_store_connect: bodylog-asc
    environment:
      xcode: latest
      node: 22
      vars:
        BUNDLE_ID: com.gotcha.bodylog
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gotcha.bodylog
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build ipa
        script: |
          xcode-project use-profiles
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
